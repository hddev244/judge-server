services:
  judge-api:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USER=judge
      - DB_PASSWORD=judge
      - JUDGE_TESTCASE_BASE_PATH=/data/problems
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - /tmp/judge:/tmp/judge
      - /data/problems:/data/problems
    group_add:
      - "999"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: judgedb
      POSTGRES_USER: judge
      POSTGRES_PASSWORD: judge
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judge -d judgedb"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pg-data:
