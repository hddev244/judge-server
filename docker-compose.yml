services:
  judge-api:
    build: .
    ports:
      - "${SERVER_PORT:-8080}:8080"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:rw
      - ${JUDGE_WORK_BASE:-/tmp/judge}:${JUDGE_WORK_BASE:-/tmp/judge}
      - ${JUDGE_TESTCASE_BASE_PATH:-/data/problems}:${JUDGE_TESTCASE_BASE_PATH:-/data/problems}
    group_add:
      - "999"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-judgedb}
      POSTGRES_USER: ${DB_USER:-judge}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-judge}
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-judge} -d ${DB_NAME:-judgedb}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --save "" --appendonly no
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  pg-data:
