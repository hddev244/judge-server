<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Judge — Làm bài</title>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;--surface:#1a1d27;--surface2:#222536;--border:#2e3148;
  --accent:#6c63ff;--accent2:#00d4aa;--text:#e2e4f0;--muted:#8b8fa8;
  --green:#22c55e;--yellow:#f59e0b;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;
  --mono:'JetBrains Mono','Fira Code','Consolas',monospace;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Top bar */
.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.topbar .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px;margin-right:auto}
.topbar .icon{width:28px;height:28px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.topbar .key-wrap{display:flex;align-items:center;gap:8px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:5px 10px}
.topbar .key-wrap label{font-size:11px;color:var(--muted);white-space:nowrap}
.topbar .key-wrap input{background:transparent;border:none;outline:none;color:var(--text);font-size:12px;font-family:var(--mono);width:230px}
.topbar a{font-size:12px;color:var(--muted);text-decoration:none}
.topbar a:hover{color:var(--text)}

/* Layout */
.workspace{display:flex;flex:1;overflow:hidden}

/* Problem list */
.prob-list{width:240px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.prob-list-head{padding:14px 16px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);border-bottom:1px solid var(--border)}
.prob-items{flex:1;overflow-y:auto;padding:6px}
.prob-item{padding:9px 11px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:2px}
.prob-item:hover{background:var(--surface2)}
.prob-item.active{background:rgba(108,99,255,.15);border-left:3px solid var(--accent)}
.prob-item.active .pi-title{color:var(--accent)}
.pi-title{font-size:13.5px;font-weight:600;margin-bottom:2px}
.pi-meta{font-size:11px;color:var(--muted)}
.prob-empty{padding:24px 16px;text-align:center;font-size:13px;color:var(--muted)}

/* Problem + editor area */
.content{flex:1;display:flex;overflow:hidden}

/* Problem statement */
.prob-statement{width:42%;border-right:1px solid var(--border);overflow-y:auto;padding:24px 28px}
.prob-statement.hidden{display:none}
.prob-none{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:10px}
.prob-none .ni{font-size:40px}
.prob-title{font-size:19px;font-weight:800;margin-bottom:6px}
.prob-limits{display:flex;gap:16px;margin-bottom:18px}
.limit-badge{background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--muted)}
.limit-badge span{color:var(--text);font-weight:600}
.prob-desc{font-size:13.5px;line-height:1.75;color:#c8cce0}
.prob-desc p{margin-bottom:10px}.prob-desc h1,.prob-desc h2,.prob-desc h3{margin:14px 0 6px;font-weight:700}.prob-desc ul,.prob-desc ol{padding-left:20px;margin-bottom:10px}.prob-desc code{font-family:var(--mono);background:var(--surface2);padding:1px 5px;border-radius:4px}.prob-desc pre{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px;overflow-x:auto;margin-bottom:10px}.prob-desc pre code{background:none;padding:0}
.section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin:20px 0 8px}

/* Editor panel */
.editor-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.editor-toolbar{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0}
.lang-select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none;cursor:pointer}
.lang-select:focus{border-color:var(--accent)}
.editor-wrap{flex:1;overflow:hidden;position:relative}
textarea#code{width:100%;height:100%;background:var(--bg);border:none;outline:none;resize:none;color:#e2e4f0;font-family:var(--mono);font-size:13.5px;line-height:1.6;padding:16px 18px;tab-size:4}

/* Result panel */
.result-panel{height:220px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;display:flex;flex-direction:column;overflow:hidden}
.result-head{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.result-head .label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}
.result-body{flex:1;overflow-y:auto;padding:12px 16px}
.verdict-row{display:flex;align-items:center;gap:14px;margin-bottom:10px}
.verdict-big{font-size:22px;font-weight:900;letter-spacing:.5px}
.verdict-big.AC{color:var(--green)}
.verdict-big.WA{color:var(--red)}
.verdict-big.TLE,.verdict-big.MLE{color:var(--yellow)}
.verdict-big.CE,.verdict-big.RE,.verdict-big.SE{color:var(--purple)}
.verdict-big.PENDING,.verdict-big.JUDGING{color:var(--muted)}
.verdict-meta{font-size:13px;color:var(--muted)}
.tc-results{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.tc-chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:6px;font-size:12px;font-weight:700;cursor:default}
.tc-chip.AC{background:rgba(34,197,94,.15);color:var(--green)}
.tc-chip.WA{background:rgba(239,68,68,.15);color:var(--red)}
.tc-chip.TLE,.tc-chip.MLE{background:rgba(245,158,11,.15);color:var(--yellow)}
.tc-chip.CE,.tc-chip.RE,.tc-chip.SE{background:rgba(168,85,247,.15);color:var(--purple)}
.tc-chip.PENDING,.tc-chip.JUDGING{background:rgba(139,143,168,.15);color:var(--muted)}
.err-box{background:var(--bg);border:1px solid rgba(239,68,68,.3);border-radius:8px;padding:10px 14px;font-family:var(--mono);font-size:12px;color:#fca5a5;white-space:pre-wrap;word-break:break-all;max-height:110px;overflow-y:auto;margin-top:8px}
.result-idle{font-size:13px;color:var(--muted);padding:12px 0}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-size:13px;font-weight:700;border:none;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-submit{background:var(--accent);color:#fff}
.btn-submit:hover{background:#7c73ff}
.btn-submit:disabled{opacity:.45;cursor:not-allowed}
.btn-test{background:rgba(0,212,170,.15);color:var(--accent2);border:1px solid rgba(0,212,170,.35)}
.btn-test:hover{background:rgba(0,212,170,.25)}
.btn-test:disabled{opacity:.45;cursor:not-allowed}
.btn-clear{background:transparent;color:var(--muted);border:1px solid var(--border)}
.btn-clear:hover{background:var(--surface2);color:var(--text)}

/* Spinner */
.spin{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;animation:slideIn .2s ease}
.toast-item.error{background:#7f1d1d;color:#fca5a5;border:1px solid #dc2626}
.toast-item.success{background:#166534;color:#86efac;border:1px solid #16a34a}
@keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}

/* Scrollbar */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
</style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="brand"><div class="icon">⚖️</div>Judge</div>
  <div class="key-wrap">
    <label>API Key</label>
    <input id="api-key" type="password" placeholder="sk_..." autocomplete="off"/>
  </div>
  <a href="/docs.html" target="_blank">📄 Docs</a>
  <a href="/admin.html" target="_blank">⚙️ Admin</a>
</header>

<div class="workspace">

  <!-- Problem list -->
  <aside class="prob-list">
    <div class="prob-list-head">Problems</div>
    <div class="prob-items" id="prob-items">
      <div class="prob-empty">Nhập API Key để xem danh sách</div>
    </div>
  </aside>

  <!-- Content -->
  <div class="content">

    <!-- Problem statement -->
    <div class="prob-statement hidden" id="prob-statement">
      <div class="prob-title" id="ps-title"></div>
      <div class="prob-limits">
        <div class="limit-badge">⏱ <span id="ps-time"></span> ms</div>
        <div class="limit-badge">💾 <span id="ps-mem"></span> MB</div>
      </div>
      <div class="prob-desc" id="ps-desc"></div>
    </div>
    <div class="prob-none" id="prob-none">
      <div class="ni">📚</div>
      <div style="font-size:15px;font-weight:700">Chọn một bài toán</div>
      <div style="font-size:13px">để bắt đầu làm bài</div>
    </div>

    <!-- Editor + result -->
    <div class="editor-panel" id="editor-panel">
      <div class="editor-toolbar">
        <select class="lang-select" id="lang-select">
          <option value="cpp">C++ (gcc:13)</option>
          <option value="java">Java 21</option>
          <option value="python">Python 3.12</option>
        </select>
        <button class="btn btn-clear btn-sm" onclick="clearCode()" style="padding:5px 10px;font-size:12px">🗑 Xóa</button>
        <div style="flex:1"></div>
        <button class="btn btn-test" id="btn-test" onclick="runSolution(true)" disabled>
          🧪 Kiểm tra
        </button>
        <button class="btn btn-submit" id="btn-submit" onclick="runSolution(false)" disabled>
          ▶ Nộp bài
        </button>
      </div>
      <div class="editor-wrap">
        <textarea id="code" spellcheck="false" placeholder="// Nhập code của bạn ở đây...&#10;// Chọn bài toán ở cột bên trái để bắt đầu"></textarea>
      </div>
      <div class="result-panel">
        <div class="result-head">
          <span class="label">Kết quả</span>
          <span id="result-mode-badge"></span>
          <span id="result-sub-id" style="font-size:11px;font-family:var(--mono);color:var(--muted)"></span>
          <div style="flex:1"></div>
          <span id="result-time-info" style="font-size:12px;color:var(--muted)"></span>
        </div>
        <div class="result-body" id="result-body">
          <div class="result-idle">Nộp bài để xem kết quả chấm.</div>
        </div>
      </div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
const BASE = window.location.origin;
let apiKey = localStorage.getItem('judge_key') || '';
let currentProblem = null;
let pollTimer = null;
let stompClient = null;

// Init API key
const keyInput = document.getElementById('api-key');
keyInput.value = apiKey;
keyInput.addEventListener('change', () => {
  apiKey = keyInput.value.trim();
  localStorage.setItem('judge_key', apiKey);
  loadProblems();
});

// ── API helper ────────────────────────────────────────────────────
async function api(path, opts = {}) {
  const res = await fetch(BASE + path, {
    ...opts,
    headers: { 'X-API-Key': apiKey, ...(opts.headers || {}) }
  });
  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || 'HTTP ' + res.status);
  return data;
}

// ── Toast ──────────────────────────────────────────────────────────
function toast(msg, type = 'error') {
  const el = document.createElement('div');
  el.className = 'toast-item ' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Problem list ──────────────────────────────────────────────────
async function loadProblems() {
  if (!apiKey) {
    document.getElementById('prob-items').innerHTML = '<div class="prob-empty">Nhập API Key để xem danh sách</div>';
    return;
  }
  try {
    const data = await api('/api/v1/problems?size=200');
    const problems = data.content || [];
    if (!problems.length) {
      document.getElementById('prob-items').innerHTML = '<div class="prob-empty">Chưa có bài nào được publish</div>';
      return;
    }
    document.getElementById('prob-items').innerHTML = problems.map(p => `
      <div class="prob-item" id="pi-${p.id}" onclick="selectProblem(${p.id},'${esc(p.slug)}','${esc(p.title)}','${esc(p.description||'')}',${p.timeLimitMs},${p.memoryLimitKb},'${p.descriptionFormat||'MARKDOWN'}')">
        <div class="pi-title">${esc(p.title)}</div>
        <div class="pi-meta">${p.timeLimitMs}ms · ${p.memoryLimitKb/1024|0}MB</div>
      </div>`).join('');
  } catch(e) { toast('Không tải được danh sách bài: ' + e.message); }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/'/g,'&#39;').replace(/"/g,'&quot;').replace(/\n/g,'\\n');
}

function selectProblem(id, slug, title, desc, timeMs, memKb, format) {
  currentProblem = { id, slug };
  document.querySelectorAll('.prob-item').forEach(el => el.classList.remove('active'));
  document.getElementById('pi-' + id)?.classList.add('active');

  document.getElementById('ps-title').textContent = title;
  document.getElementById('ps-time').textContent = timeMs;
  document.getElementById('ps-mem').textContent = (memKb / 1024).toFixed(0);
  const raw = desc.replace(/\\n/g, '\n');
  const el = document.getElementById('ps-desc');
  if (raw) {
    el.innerHTML = DOMPurify.sanitize(format === 'HTML' ? raw : marked.parse(raw));
  } else {
    el.textContent = '(Chưa có mô tả)';
  }

  document.getElementById('prob-statement').classList.remove('hidden');
  document.getElementById('prob-none').style.display = 'none';
  document.getElementById('btn-submit').disabled = false;
  document.getElementById('btn-test').disabled = false;

  setDefaultTemplate(document.getElementById('lang-select').value);
  resetResult();
}

// ── Code templates ────────────────────────────────────────────────
const templates = {
  cpp: `#include <bits/stdc++.h>
using namespace std;

int main() {
    ios_base::sync_with_stdio(false);
    cin.tie(NULL);

    // TODO: viết code ở đây

    return 0;
}`,
  java: `import java.util.*;
import java.io.*;

public class Main {
    public static void main(String[] args) throws IOException {
        BufferedReader br = new BufferedReader(new InputStreamReader(System.in));

        // TODO: viết code ở đây

    }
}`,
  python: `import sys
input = sys.stdin.readline

def main():
    # TODO: viết code ở đây
    pass

main()`
};

function setDefaultTemplate(lang) {
  const code = document.getElementById('code');
  if (!code.value.trim() || Object.values(templates).includes(code.value)) {
    code.value = templates[lang] || '';
  }
}

document.getElementById('lang-select').addEventListener('change', e => {
  setDefaultTemplate(e.target.value);
});

function clearCode() {
  document.getElementById('code').value = templates[document.getElementById('lang-select').value] || '';
}

// ── Submit / Test ─────────────────────────────────────────────────
async function runSolution(isTestRun) {
  if (!currentProblem) { toast('Chưa chọn bài toán'); return; }
  const code = document.getElementById('code').value.trim();
  if (!code) { toast('Code trống'); return; }

  const btnSubmit = document.getElementById('btn-submit');
  const btnTest   = document.getElementById('btn-test');
  btnSubmit.disabled = true;
  btnTest.disabled   = true;

  if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
  if (stompClient) { try { stompClient.disconnect(); } catch(e) {} stompClient = null; }
  resetResult();

  if (isTestRun) {
    btnTest.innerHTML = '<span class="spin" style="border-top-color:var(--accent2);border-color:rgba(0,212,170,.3)"></span> Đang kiểm tra…';
    document.getElementById('result-body').innerHTML = '<div class="result-idle"><span class="spin" style="border-top-color:var(--accent2);border-color:rgba(0,212,170,.3)"></span> Đang chạy test mẫu…</div>';
    document.getElementById('result-mode-badge').innerHTML =
      '<span style="font-size:11px;font-weight:700;background:rgba(0,212,170,.15);color:var(--accent2);border:1px solid rgba(0,212,170,.3);border-radius:5px;padding:1px 7px;margin-left:6px">TEST MẪU</span>';
    try {
      const res = await api('/api/v1/submissions/test', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          problemId: currentProblem.id,
          language: document.getElementById('lang-select').value,
          sourceCode: code
        })
      });
      renderResult(res);
    } catch(e) {
      toast('Kiểm tra thất bại: ' + e.message);
      document.getElementById('result-body').innerHTML = '<div class="result-idle">Kiểm tra thất bại.</div>';
    } finally {
      btnSubmit.disabled = false;
      btnTest.disabled   = false;
      btnTest.innerHTML  = '🧪 Kiểm tra';
    }
  } else {
    btnSubmit.innerHTML = '<span class="spin"></span> Đang nộp…';
    document.getElementById('result-body').innerHTML = '<div class="result-idle"><span class="spin" style="border-top-color:var(--accent);border-color:rgba(108,99,255,.3)"></span> Đang nộp bài…</div>';
    document.getElementById('result-mode-badge').innerHTML =
      '<span style="font-size:11px;font-weight:700;background:rgba(108,99,255,.15);color:var(--accent);border:1px solid rgba(108,99,255,.3);border-radius:5px;padding:1px 7px;margin-left:6px">NỘP BÀI</span>';
    try {
      const res = await api('/api/v1/submissions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          problemId: currentProblem.id,
          language: document.getElementById('lang-select').value,
          sourceCode: code
        })
      });
      document.getElementById('result-sub-id').textContent = res.submissionId;
      renderResult(res);
      if (res.status === 'PENDING' || res.status === 'JUDGING') {
        startWsTracking(res.submissionId);
      }
    } catch(e) {
      toast('Nộp bài thất bại: ' + e.message);
      document.getElementById('result-body').innerHTML = '<div class="result-idle">Nộp bài thất bại.</div>';
    } finally {
      btnSubmit.disabled = false;
      btnTest.disabled   = false;
      btnSubmit.innerHTML = '▶ Nộp bài';
    }
  }
}

function startWsTracking(subId) {
  let wsConnected = false;
  const wsTimeout = setTimeout(() => {
    if (!wsConnected) startPolling(subId);  // fallback if WS fails to connect
  }, 3000);

  try {
    const socket = new SockJS(BASE + '/ws');
    stompClient = Stomp.over(socket);
    stompClient.debug = null;  // silence STOMP debug logs
    stompClient.connect({}, () => {
      wsConnected = true;
      clearTimeout(wsTimeout);
      stompClient.subscribe('/topic/submissions/' + subId, (msg) => {
        const result = JSON.parse(msg.body);
        renderWsResult(result);
        if (!['PENDING', 'JUDGING'].includes(result.status)) {
          try { stompClient.disconnect(); } catch(e) {}
          stompClient = null;
          document.getElementById('btn-submit').disabled = false;
          document.getElementById('btn-test').disabled = false;
          document.getElementById('btn-submit').innerHTML = '▶ Nộp bài';
        }
      });
    }, () => {
      // STOMP error — fall back to polling
      if (!wsConnected) { clearTimeout(wsTimeout); startPolling(subId); }
    });
  } catch(e) {
    clearTimeout(wsTimeout);
    startPolling(subId);
  }
}

function startPolling(subId) {
  let attempts = 0;
  pollTimer = setInterval(async () => {
    attempts++;
    try {
      const res = await api('/api/v1/submissions/' + subId);
      renderResult(res);
      if (res.status !== 'PENDING' && res.status !== 'JUDGING') {
        clearInterval(pollTimer); pollTimer = null;
      }
    } catch(e) { /* ignore */ }
    if (attempts > 60) { clearInterval(pollTimer); pollTimer = null; }
  }, 1500);
}

function renderWsResult(msg) {
  // WS payload: {submissionId, status, score, timeMs, errorMessage, testResults}
  const adapted = {
    status: msg.status,
    score: msg.score ?? 0,
    timeMs: msg.timeMs,
    errorMessage: msg.errorMessage,
    testResults: (msg.testResults || []).map(r => ({
      testCaseId: r.testCaseId,
      status: r.status,
      timeMs: r.timeMs,
      memoryKb: r.memoryKb
    }))
  };
  renderResult(adapted);
}

function renderResult(s) {
  const status = s.status || 'PENDING';
  const isDone = status !== 'PENDING' && status !== 'JUDGING';
  const scoreHtml = isDone ? `<span style="font-size:14px;font-weight:700">Score: ${s.score ?? 0}</span>` : '';
  const timeHtml = s.timeMs ? `${s.timeMs} ms` : '';
  document.getElementById('result-time-info').textContent = timeHtml;

  let tcHtml = '';
  if (s.testResults?.length) {
    tcHtml = `<div class="tc-results">` +
      s.testResults.map((r, i) =>
        `<div class="tc-chip ${r.status}" title="TC ${i+1} · ${r.timeMs||'?'}ms">#${i+1} ${r.status}</div>`
      ).join('') + `</div>`;
  }

  const errHtml = s.errorMessage
    ? `<div class="err-box">${escHtml(s.errorMessage)}</div>` : '';

  const spinHtml = !isDone
    ? `<span class="spin" style="border-top-color:var(--accent);border-color:rgba(108,99,255,.3)"></span>` : '';

  document.getElementById('result-body').innerHTML = `
    <div class="verdict-row">
      <div class="verdict-big ${status}">${status}</div>
      ${scoreHtml}
      ${spinHtml}
    </div>
    ${tcHtml}
    ${errHtml}`;
}

function resetResult() {
  document.getElementById('result-sub-id').textContent = '';
  document.getElementById('result-mode-badge').innerHTML = '';
  document.getElementById('result-time-info').textContent = '';
  document.getElementById('result-body').innerHTML = '<div class="result-idle">Nhấn <strong>Kiểm tra</strong> để chạy test mẫu, hoặc <strong>Nộp bài</strong> để chấm toàn bộ.</div>';
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Tab support in textarea
document.getElementById('code').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target, s = el.selectionStart, end = el.selectionEnd;
    el.value = el.value.substring(0, s) + '    ' + el.value.substring(end);
    el.selectionStart = el.selectionEnd = s + 4;
  }
});

// Boot
if (apiKey) loadProblems();
</script>
</body>
</html>
