server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: judge-server

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 52MB

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/judgedb}
    username: ${DB_USER:judge}
    password: ${DB_PASSWORD:judge}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  flyway:
    enabled: true
    locations: classpath:db/migration

judge:
  workers: ${JUDGE_WORKERS:4}
  work-base: ${JUDGE_WORK_BASE:/tmp/judge}
  queue-key: ${JUDGE_QUEUE_KEY:judge:queue}
  testcase-base-path: ${JUDGE_TESTCASE_BASE_PATH:/data/problems}
  languages:
    cpp:
      image: ${JUDGE_LANG_CPP_IMAGE:gcc:13}
      source-file: solution.cpp
      compile-cmd: "g++ -O2 -std=c++17 -o solution solution.cpp"
      run-cmd: "./solution"
    java:
      image: ${JUDGE_LANG_JAVA_IMAGE:eclipse-temurin:21}
      source-file: Solution.java
      compile-cmd: "javac -encoding UTF-8 Solution.java"
      run-cmd: "java -cp /code -Xmx{mem}m Solution"
    python:
      image: ${JUDGE_LANG_PYTHON_IMAGE:python:3.12-slim}
      source-file: solution.py
      compile-cmd: ""
      run-cmd: "python3 solution.py"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      show-components: always

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${DB_NAME:judgedb}

  data:
    redis:
      host: ${REDIS_HOST:redis}
